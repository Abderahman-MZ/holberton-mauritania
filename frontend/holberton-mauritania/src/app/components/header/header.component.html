<header class="bg-holberton-blue text-white py-4 shadow-md">
  <div class="container mx-auto flex justify-between items-center px-4">
    <div class="flex items-center space-x-2">
      <img src="assets/logo.png" alt="Holberton Logo" class="h-10">
      <h1 class="text-xl font-bold">{{ 'HEADER.TITLE' | translate }}</h1>
    </div>
    <nav>
      <ul class="flex space-x-6">
        <li *ngFor="let item of menuItems">
          <a [routerLink]="item.link" class="hover:underline">{{ item.label | translate }}</a>
        </li>
      </ul>
    </nav>
    <app-language-switcher></app-language-switcher>
  </div>
</header>
